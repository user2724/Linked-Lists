class Node {
  constructor(value) {
    this.value = value;
    this.nextNode = null;
  }
}

class LinkedList {
  constructor() {
    this.head = null;
  }

  append(value) {
    const newNode = new Node(value);

    if (!this.head) {
      this.head = newNode;
    } else {
      let current = this.head;

      while (current.nextNode) {
        current = current.nextNode;
      }

      current.nextNode = newNode;
    }
  }

  prepend(value) {
    const newNode = new Node(value);

    newNode.nextNode = this.head;
    this.head = newNode;
  }

  size() {
    let count = 0;
    let current = this.head;

    while (current !== null) {
      count++;
      current = current.nextNode;
    }

    return count;
  }

first() {
    if (this.head !== null) {
        let current = this.head
       return current
    } else {
        return undefined
    }
}

last() {
   let current = this.head;
   while (current.nextNode !== null) {
    current = current.nextNode
   }
   return current
}

at(index) {
    let count = 0;
    let current = this.head
    while (count < index) {
     count += 1
     current = current.nextNode

    }
    return current
}

pop() {

    if (this.head !== null) {
    let head = this.head
     
     this.head = head.nextNode
     return head
    } else {
        return undefined
    }
}

removeAt(index) {

let count = 0;
let current = this.head
    while (count < index) {
     count += 1
     current = current.nextNode

let curr = this.head;
    while (curr.nextNode && curr.nextNode.value !== current.value) {

    }

    if (curr.nextNode) {
        // Point the current node to the one AFTER the target node
        curr.nextNode = curr.nextNode.nextNode;

}
